name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # Mergem în folderul proiectului
            cd /opt/pixtooth/repo || { echo "Folderul /opt/pixtooth/repo nu există"; exit 1; }
            
            # Actualizăm tot repository-ul (pentru a avea ultimele modificări din 'server')
            echo "Pulls latest changes from main..."
            git pull origin main
            
            # Intrăm în folderul server
            cd server
            
            # Instalăm doar dependențele necesare pentru producție
            echo "Installing server dependencies..."
            npm install --production
            
            # Restartăm procesul în PM2
            echo "Restarting PM2 process (pixtooth-api)..."
            pm2 restart pixtooth-api || pm2 start app.js --name pixtooth-api
            
            echo "Backend deployment finished successfully!"
