name: 🌐 Deploy Frontend to Cloudflare Pages

on:
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  DOMAIN: ${{ vars.DOMAIN || 'app.pixtooth.com' }}

jobs:
  deploy-frontend:
    name: 🌐 Deploy Frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 🔨 Build Frontend
        id: build
        run: |
          cat > .env.production << ENVEOF
          VITE_API_URL=https://api.${{ env.DOMAIN }}/api/v1
          VITE_DEV_MODE=false
          ENVEOF
          npm ci
          npm run build

      - name: 🏗️ Ensure Cloudflare Pages Project
        id: cf_project
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name":"pixtooth-app","production_branch":"main"}' || true
          echo "Pages project ready"

      - name: 🚀 Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: pixtooth-app
          directory: dist
          productionBranch: main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Set Status
        id: status
        if: always()
        run: |
          if [ "${{ steps.build.outcome }}" == "success" ] && \
             [ "${{ steps.deploy.outcome }}" == "success" ]; then
            echo "status=✅ SUCCESS" >> $GITHUB_OUTPUT
          else
            echo "status=❌ FAILED" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: 📝 Log Result
        if: always()
        run: |
          if [ "${{ steps.build.outcome }}" == "success" ] && \
             [ "${{ steps.deploy.outcome }}" == "success" ]; then
            echo "✅ Frontend deployed to https://app.${{ env.DOMAIN }}"
          else
            echo "❌ Frontend deploy failed"
            exit 1
          fi
