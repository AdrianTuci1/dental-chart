apiVersion: apps/v1
kind: Deployment
metadata:
  name: dental-chart-backend
  namespace: dental-chart
  labels:
    app.kubernetes.io/name: dental-chart
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dental-chart
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dental-chart
        app.kubernetes.io/component: backend
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: backend
          image: ghcr.io/adriantuci1/dental-chart-backend:686eec3e71bdfb49d41ac704b4027be3d205130c
          ports:
            - name: http
              containerPort: 3001
          envFrom:
            - configMapRef:
                name: dental-chart-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: dental-chart-secrets
                  key: JWT_SECRET
            - name: REFRESH_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: dental-chart-secrets
                  key: REFRESH_TOKEN_SECRET
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: dental-chart-aws
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: dental-chart-aws
                  key: AWS_SECRET_ACCESS_KEY
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
